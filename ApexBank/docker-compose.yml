services:
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    extends:
      file: common-config.yml
      service: network-deploy-service

  configserver:
    image: "apexhunt/configserver:v2"
    container_name: configserverApex
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
        test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 10s
    extends:
        file: common-config.yml
        service: microservice-base-config

  accounts:
    image: "apexhunt/accounts:v2"
    container_name: accountsApex
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
        SPRING_APPLICATION_NAME: "accounts"
    extends:
        file: common-config.yml
        service: microservice-configserver-config

  loans:
    image: "apexhunt/loans:v2"
    container_name: loansApex
    ports:
      - "8090:8090"
    depends_on:
     configserver:
      condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  cards:
    image: "apexhunt/cards:v2"
    container_name: cardsApex
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
        SPRING_APPLICATION_NAME: "cards"
    extends:
        file: common-config.yml
        service: microservice-configserver-config

networks:
  apexbank:
    driver: "bridge"