#      start_period: 5s
#    extends:
#      file: common-config.yml
#      service: network-deploy-service

  configserver:
    image: "apexhunt/configserver:v4"
    container_name: configserverApex
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
        test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 10s
    extends:
        file: common-config.yml
        service: microservice-base-config

  eurekaserver:
    image: "apexhunt/eurekaserver:v4"
    container_name: eurekaserverApex
    ports:
      - "8070:8070"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"

  accounts:
    image: "apexhunt/accounts:v4"
    container_name: accountsApex
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
        SPRING_APPLICATION_NAME: "accounts"
    extends:
        file: common-config.yml
        service: microservice-configserver-config

  loans:
    image: "apexhunt/loans:v4"
    container_name: loansApex
    ports:
      - "8090:8090"
    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
     configserver:
      condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  cards:
    image: "apexhunt/cards:v4"
    container_name: cardsApex
    ports:
      - "9000:9000"
    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      configserver:
        condition: service_healthy
    environment:
        SPRING_APPLICATION_NAME: "cards"
    extends:
        file: common-config.yml
        service: microservice-configserver-config

  apigatewayserver:
    image: "apexhunt/apigatewayserver:v4"
    container_name: gatewayserverApex
    ports:
      - "8072:8072"
    depends_on:
      accounts:
        condition: service_healthy
      loans:
        condition: service_healthy
      cards:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8072/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "apigatewayserver"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

networks:
  apexbank:
    driver: "bridge"