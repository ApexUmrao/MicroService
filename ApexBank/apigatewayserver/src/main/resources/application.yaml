spring:
  application:
    name: apigatewayserver
  config:
    import: "configserver:http://localhost:8071/"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    gateway:
      access: unrestricted
  info:
    env:
     enabled: true

info:
  app:
    name: "API Gateway Server"
    description: "Apex Bank API Gateway Application"
    version: "1.0"