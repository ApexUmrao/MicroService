server:
  http_listen_port: 3100
  http_listen_address: 0.0.0.0

metrics_generator:
  storage:
    path: /tmp/tempo/generator/wal

  registry:
    collection_interval: 15s

  ring:
    kvstore:
      store: inmemory

  processor:
    service_graphs: {}
    span_metrics: {}
    local_blocks: {}

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
        
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1000000
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window: 1h
    max_compaction_objects: 1000000
    block_retention: 1h
    compacted_block_retention: 10m

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

